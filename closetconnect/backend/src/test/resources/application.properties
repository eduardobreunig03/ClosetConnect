# In-memory DB for tests (Postgres-compatible mode)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Don’t run migrations in unit tests
spring.flyway.enabled=false
spring.liquibase.enabled=false
spring.sql.init.mode=never

spring.datasource.url=jdbc:h2:mem:closetconnect;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.hikari.maximum-pool-size=4

# --- Hibernate / JPA ---
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- Disable DB initializers you don't need in tests ---
spring.sql.init.mode=never
spring.flyway.enabled=false

# Optional: keep logs quieter
logging.level.org.hibernate.tool.schema=ERROR

# Disable Spring Security for tests (this will exclude SecurityConfig)
spring.security.enabled=false

# Disable Spring Security auto-configuration for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

