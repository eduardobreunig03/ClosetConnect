version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: closetconnect-postgres
    environment:
      POSTGRES_DB: closetconnect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - closetconnect-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: closetconnect-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@closetconnect.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - closetconnect-network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  closetconnect-network:
    driver: bridge
